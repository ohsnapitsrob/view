<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Find That Scene</title>

  <link rel="preconnect" href="https://images.pixieset.com">
  <link rel="stylesheet" href="./home.css" />

  <script src="./runtime-config.js"></script>
  <script src="./config.js"></script>
  <script src="./src/feature-toggles.js"></script>
  <script src="./src/site-content.js"></script>
  <script src="./src/app-shell.js"></script>
  <script src="./src/boot.js"></script>
</head>
<body>
  <noscript>
    <div style="margin:16px; padding:16px; border-radius:18px; background:#111827; color:#ffffff; font:14px/1.5 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
      <strong>JavaScript is needed for Find That Scene.</strong><br>
      Maps, search, browsing features, privacy settings, and optional media controls rely on JavaScript. Optional media embeds are not loaded unless JavaScript is enabled and consent is given.
    </div>
  </noscript>

  <main class="home-shell">
    <section id="railsRoot" class="rails-root" aria-live="polite">
      <div class="loading-card">Loading rails…</div>
    </section>

    <section class="home-stats-section" style="display:none;">
      <h2 class="rail-title">Project stats at a glance</h2>

      <div id="homeStats" class="stats-grid" aria-live="polite">
        <article class="stat-card"><div class="stat-value">—</div><div class="stat-label">Scenes visited</div></article>
        <article class="stat-card"><div class="stat-value">—</div><div class="stat-label">Titles</div></article>
        <article class="stat-card"><div class="stat-value">—</div><div class="stat-label">Cities</div></article>
        <article class="stat-card"><div class="stat-value">—</div><div class="stat-label">Countries</div></article>
      </div>
    </section>

    <a style="display:none;" class="more-stats" href="./stats/">View more stats</a>

    <div data-site-disclaimer></div>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const mapParams = ["q", "tab", "fk", "fl", "loc", "rm", "mlat", "mlng", "mz"];
      const shouldRedirect = mapParams.some((key) => params.has(key));
      if (shouldRedirect) window.location.replace("./explore/" + window.location.search);
    })();
  </script>

  <script src="./src/disclaimer.js"></script>
  <script src="./src/utils.js"></script>
  <script src="./src/data-cache.js"></script>
  <script src="./src/csv.js"></script>
  <script src="./src/data-store.js"></script>
  <script src="./src/scene-packs.js"></script>
  <script src="./src/title-datasets.js"></script>
  <script src="./src/home-v2-utils.js"></script>
  <script src="./src/home-v2-data.js"></script>
  <script src="./src/home-v2-rails.js"></script>
  <script src="./src/home-v2-renderer.js"></script>
  <script src="./src/home-v2.js"></script>
</body>
</html>
