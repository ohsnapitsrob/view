<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>On the Map</title>

  <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.8.0/maptiler-sdk.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <a href="./browse/" class="icon-btn topbar-browse-btn" aria-label="Browse titles" title="Browse titles">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 6.5A1.5 1.5 0 0 1 5.5 5h2A1.5 1.5 0 0 1 9 6.5v2A1.5 1.5 0 0 1 7.5 10h-2A1.5 1.5 0 0 1 4 8.5v-2zm0 9A1.5 1.5 0 0 1 5.5 14h2A1.5 1.5 0 0 1 9 15.5v2A1.5 1.5 0 0 1 7.5 19h-2A1.5 1.5 0 0 1 4 17.5v-2zM11 7h9v2h-9V7zm0 8h9v2h-9v-2z"></path>
        </svg>
      </a>

      <input
        id="search"
        type="search"
        placeholder="Search title, place, collection, keyword…"
        autocomplete="off"
      />

      <div class="topbar-actions">
        <button id="resetFilter" class="btn btn-secondary" style="display:none;">Reset</button>
      </div>
    </div>

    <div class="topbar-meta">
      <span id="count" class="count"></span>
      <span id="filterLabel" class="filter-label" style="display:none;"></span>
    </div>
  </header>

  <div id="map"></div>

  <div id="resultsModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <button id="resultsCloseBtn" class="btn close">Close</button>

      <div class="tabs">
        <button id="tabGroups" class="tab active">Groups</button>
        <button id="tabPlaces" class="tab">Places</button>
      </div>

      <div id="results" class="results"></div>
    </div>
  </div>

  <div id="modal" class="modal location-modal" aria-hidden="true">
    <div class="modal-card modal-card-location">
      <button id="closeBtn" class="btn close">Close</button>

      <h2 id="mTitle" class="loc-title"></h2>
      <div id="mInfo" class="loc-info"></div>
      <p id="mDesc" class="loc-desc"></p>
      <div id="mGallery" class="gallery"></div>

      <div class="loc-tags-wrap">
        <div class="loc-tags-label">See more like this:</div>
        <div id="mTags" class="loc-tags"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.8.0/maptiler-sdk.umd.min.js"></script>
  <script src="https://unpkg.com/fuse.js@7.0.0/dist/fuse.min.js"></script>

  <script src="config.js"></script>

  <script src="src/state.js"></script>
  <script src="src/router.js"></script>
  <script src="src/map.js"></script>
  <script src="src/modal.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/search.js"></script>
  <script src="src/data.js"></script>

  <script src="app.js"></script>
</body>
</html>
