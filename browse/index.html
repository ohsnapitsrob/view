<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>All Titles | Find That Scene</title>

  <link rel="preconnect" href="https://images.pixieset.com">
  <link rel="stylesheet" href="../src/loader.css" />
  <link rel="stylesheet" href="./browse.css" />

  <script src="../runtime-config.js"></script>
  <script src="../config.js"></script>
  <script src="../src/feature-toggles.js"></script>
  <script src="../src/site-content.js"></script>
  <script src="../src/app-shell.js"></script>
  <script src="../src/boot.js"></script>
</head>
<body>
  <noscript>
    <div style="margin:16px; padding:16px; border-radius:18px; background:#111827; color:#ffffff; font:14px/1.5 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
      <strong>JavaScript is needed for Find That Scene.</strong><br>
      Maps, search, browsing features, privacy settings, and optional media controls rely on JavaScript. Optional media embeds are not loaded unless JavaScript is enabled and consent is given.
    </div>
  </noscript>

  <main class="browse-shell">
    <section class="browse-hero">
      <div class="browse-hero-main">
        <div>
          <h1>All titles</h1>
          <p>Browse every title in the project, sort by scene count or visit date, then jump straight to the map.</p>
        </div>
      </div>
    </section>

    <section class="browse-panel">
      <div class="browse-tools">
        <input
          id="browseSearch"
          class="browse-search"
          type="search"
          placeholder="Filter titles…"
          autocomplete="off"
        />

        <select id="browseSort" class="browse-sort" aria-label="Sort titles">
          <option value="most">Most scenes</option>
          <option value="az">A–Z</option>
          <option value="za">Z–A</option>
          <option value="visited-latest">Visited (latest to oldest)</option>
          <option value="visited-oldest">Visited (oldest to latest)</option>
        </select>

        <div id="browseCount" class="browse-count"></div>
      </div>

      <div id="browseList" class="browse-list"><div class="fts-loader" aria-label="Loading"></div></div>
    </section>

    <div data-site-disclaimer></div>
  </main>

  <script src="../src/disclaimer.js"></script>
  <script src="../src/utils.js"></script>
  <script src="../src/data-cache.js"></script>
  <script src="../src/csv.js"></script>
  <script src="../src/data-store.js"></script>
  <script src="../src/scene-packs.js"></script>
  <script src="../src/visibility.js"></script>
  <script src="../src/locations.js"></script>
  <script src="./browse.js"></script>
</body>
</html>
