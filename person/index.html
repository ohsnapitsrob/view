<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Person | Find That Scene</title>

  <link rel="preconnect" href="https://images.pixieset.com">
  <link rel="stylesheet" href="../src/loader.css" />
  <link rel="stylesheet" href="../home.css" />

  <style>
    .person-shell { width:min(1240px,100%); margin:0 auto; padding:22px 18px 56px; display:grid; gap:26px; }
    .person-hero { background:#fff; border:1px solid var(--border); border-radius:var(--radius-xl); box-shadow:var(--shadow-card); padding:24px; display:grid; grid-template-columns:minmax(0,1fr); align-items:center; gap:18px; }
    .person-hero-copy { min-width:0; display:grid; gap:10px; }
    .person-kicker { margin:0; color:#9ca3af; font-size:12px; font-weight:850; letter-spacing:.08em; text-transform:uppercase; }
    .person-title { margin:0; font-size:clamp(34px,7vw,72px); line-height:.95; letter-spacing:-.06em; font-weight:900; overflow-wrap:anywhere; }
    .person-copy { margin:0; color:#555; font-size:15px; line-height:1.5; max-width:720px; }
    .person-grid { display:grid; gap:30px; min-width:0; }
    .person-section-title { margin:0 0 14px; font-size:22px; font-weight:900; letter-spacing:-.03em; }
    .person-grid-section { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:18px 16px; min-width:0; }
    .person-card { color:inherit; text-decoration:none; display:block; min-width:0; }
    .person-card .poster-card { width:100%; }
    .person-card .poster-card img { width:100%; }
    .poster-fallback { width:auto; aspect-ratio:2/3; border-radius:18px; background:#111827; color:#fff; display:grid; place-items:center; padding:14px; text-align:center; font-weight:800; }
    .type-loading-stage { min-height:260px; display:grid; place-items:center; }
    @media (max-width: 560px) { .person-hero { gap:14px; padding:20px; } .person-grid-section { grid-template-columns:repeat(auto-fill,minmax(118px,1fr)); gap:14px; } }
  </style>

  <script src="../runtime-config.js"></script>
  <script src="../config.js"></script>
  <script src="../src/feature-toggles.js"></script>
  <script src="../src/site-content.js"></script>
  <script src="../src/app-shell.js"></script>
  <script src="../src/boot.js"></script>
</head>
<body data-nav-root="../">
  <main class="person-shell">
    <section class="person-hero">
      <div class="person-hero-copy">
        <p class="person-kicker">Person</p>
        <h1 class="person-title" id="personTitle">Loading…</h1>
        <p class="person-copy" id="personCopy">Finding connected titles.</p>
      </div>
    </section>

    <section id="personContent" class="person-grid">
      <section class="type-loading-stage"><div class="fts-loader" aria-label="Loading"></div></section>
    </section>
  </main>

  <script src="../src/utils.js"></script>
  <script src="../src/data-cache.js"></script>
  <script src="../src/csv.js"></script>
  <script src="../src/data-store.js"></script>
  <script src="../src/scene-packs.js"></script>
  <script src="../src/title-datasets.js"></script>
  <script src="./person.js"></script>
</body>
</html>
