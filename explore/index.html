<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>On The Map — Explore</title>

  <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.8.0/maptiler-sdk.css" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./styles.css" />

  <script src="../runtime-config.js"></script>
  <script src="../config.js"></script>
  <script src="../src/feature-toggles.js"></script>
  <script src="../src/site-content.js"></script>
  <script src="../src/app-shell.js"></script>
  <script src="../src/boot.js"></script>
  <script src="../src/data-cache.js"></script>
</head>
<body>
  <noscript>
    <div style="margin:16px; padding:16px; border-radius:18px; background:#111827; color:#ffffff; font:14px/1.5 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
      <strong>JavaScript is needed for Find That Scene.</strong><br>
      Maps, search, browsing features, privacy settings, and optional media controls rely on JavaScript. Optional media embeds are not loaded unless JavaScript is enabled and consent is given.
    </div>
  </noscript>

  <header class="topbar">
    <div class="topbar-inner">
      <input
        id="search"
        type="search"
        placeholder="Search title, place, collection, keyword…"
        autocomplete="off"
      />
    </div>

    <div class="topbar-meta">
      <span id="count" class="count"></span>
      <span id="filterLabel" class="filter-label" style="display:none;"></span>
      <button id="resetFilter" class="btn btn-secondary map-reset-btn" style="display:none;">Reset</button>
    </div>
  </header>

  <div id="map"></div>

  <div id="resultsModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <button id="resultsCloseBtn" class="btn close">Close</button>

      <div class="tabs">
        <button id="tabGroups" class="tab active">Groups</button>
        <button id="tabPlaces" class="tab">Places</button>
      </div>

      <div id="results" class="results"></div>
    </div>
  </div>

  <div id="modal" class="modal location-modal" aria-hidden="true">
    <div class="modal-card modal-card-location">
      <button id="closeBtn" class="btn close">Close</button>

      <div class="loc-title-row">
        <button id="modalBackBtn" class="modal-back-btn" type="button" aria-label="Back to scenes at this location" style="display:none;">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15.5 5.5L9 12l6.5 6.5l-1.4 1.4L6.2 12l7.9-7.9l1.4 1.4z"></path>
          </svg>
        </button>

        <h2 id="mTitle" class="loc-title"></h2>
      </div>

      <div id="mInfo" class="loc-info"></div>
      <div id="mRatingTags" class="rating-tags"></div>
      <div id="mActions" class="location-actions"></div>

      <p id="mDesc" class="loc-desc"></p>
      <div id="mGallery" class="gallery"></div>

      <div class="loc-tags-wrap">
        <div class="loc-tags-label">See more like this:</div>
        <div id="mTags" class="loc-tags"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.8.0/maptiler-sdk.umd.min.js"></script>
  <script src="https://unpkg.com/fuse.js@7.0.0/dist/fuse.min.js"></script>

  <script src="../src/state.js"></script>
  <script src="../src/router.js"></script>
  <script src="../src/map.js"></script>
  <script src="../src/modal.js"></script>
  <script src="../src/ui.js"></script>
  <script src="../src/search.js"></script>
  <script src="../src/data.js"></script>

  <script src="../app.js"></script>
</body>
</html>
