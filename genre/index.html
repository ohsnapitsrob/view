<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Genre | Find That Scene</title>

  <link rel="preconnect" href="https://images.pixieset.com">
  <link rel="stylesheet" href="../src/loader.css" />
  <link rel="stylesheet" href="../home.css" />

  <style>
    .genre-shell { width:min(1240px,100%); margin:0 auto; padding:22px 18px 56px; display:grid; gap:26px; }
    .genre-hero { background:#fff; border:1px solid var(--border); border-radius:var(--radius-xl); box-shadow:var(--shadow-card); padding:24px; display:grid; gap:10px; }
    .genre-kicker { margin:0; color:#9ca3af; font-size:12px; font-weight:850; letter-spacing:.08em; text-transform:uppercase; }
    .genre-title { margin:0; font-size:clamp(34px,7vw,72px); line-height:.95; letter-spacing:-.06em; font-weight:900; overflow-wrap:anywhere; }
    .genre-copy { margin:0; color:#555; font-size:15px; line-height:1.5; max-width:720px; }
    .genre-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:18px 16px; min-width:0; }
    .genre-card { color:inherit; text-decoration:none; display:block; min-width:0; }
    .genre-card .poster-card { width:100%; }
    .genre-card .poster-card img { width:100%; }
    .poster-fallback { width:auto; aspect-ratio:2/3; border-radius:18px; background:#111827; color:#fff; display:grid; place-items:center; padding:14px; text-align:center; font-weight:800; }
    .type-loading-stage { min-height:260px; display:grid; place-items:center; }
    @media (max-width: 560px) { .genre-hero { padding:20px; } .genre-grid { grid-template-columns:repeat(auto-fill,minmax(118px,1fr)); gap:14px; } }
  </style>

  <script src="../runtime-config.js"></script>
  <script src="../config.js"></script>
  <script src="../src/feature-toggles.js"></script>
  <script src="../src/site-content.js"></script>
  <script src="../src/app-shell.js"></script>
  <script src="../src/boot.js"></script>
</head>
<body data-nav-root="../">
  <main class="genre-shell">
    <section class="genre-hero">
      <p class="genre-kicker">Genre</p>
      <h1 id="genreTitle" class="genre-title">Loading…</h1>
      <p id="genreCopy" class="genre-copy">Finding matching titles.</p>
    </section>

    <section>
      <div id="genreGrid" class="genre-grid"><div class="fts-loader" aria-label="Loading"></div></div>
    </section>
  </main>

  <script src="../src/utils.js"></script>
  <script src="../src/data-cache.js"></script>
  <script src="../src/csv.js"></script>
  <script src="../src/data-store.js"></script>
  <script src="../src/scene-packs.js"></script>
  <script src="../src/title-datasets.js"></script>
  <script src="./genre.js"></script>
</body>
</html>
