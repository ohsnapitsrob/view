<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stats</title>

  <link rel="stylesheet" href="../styles.css" />

  <style>
    html, body {
      overflow: auto;
      height: auto;
      min-height: 100%;
      background: #fff;
    }

    body {
      display: block;
    }

    .stats-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .stats-head {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .stats-head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stats-head h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.05;
    }

    .stats-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      grid-column: span 3;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      background: #fff;
    }

    .stat-card.wide {
      grid-column: span 6;
    }

    .stat-card.full {
      grid-column: span 12;
    }

    .stat-kicker {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .stat-sub {
      font-size: 14px;
      opacity: 0.8;
      line-height: 1.35;
    }

    .stat-list {
      display: grid;
      gap: 10px;
    }

    .stat-list-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
      font-size: 14px;
    }

    .stat-list-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .stat-list-label {
      opacity: 0.8;
    }

    .stat-list-value {
      font-weight: 600;
      text-align: right;
    }

    .stat-empty,
    .stat-loading {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      font-size: 14px;
      opacity: 0.75;
      background: #fff;
    }

    @media (max-width: 1000px) {
      .stat-card {
        grid-column: span 6;
      }

      .stat-card.wide {
        grid-column: span 12;
      }
    }

    @media (max-width: 640px) {
      .stats-head h1 {
        font-size: 28px;
      }

      .stat-card,
      .stat-card.wide,
      .stat-card.full {
        grid-column: span 12;
      }

      .stats-nav .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="stats-wrap">
    <div class="stats-head">
      <div class="stats-head-top">
        <h1>Stats</h1>

        <div class="stats-nav">
          <a href="../" class="btn">Map view</a>
          <a href="../browse/" class="btn">Browse view</a>
        </div>
      </div>
    </div>

    <div id="statsLoading" class="stat-loading">Loading stats…</div>
    <div id="statsGrid" class="stats-grid" style="display:none;"></div>
  </div>

  <script src="../config.js"></script>
  <script src="./stats.js"></script>
</body>
</html>
