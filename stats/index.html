<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stats</title>

  <link rel="stylesheet" href="../styles.css" />

  <style>
    :root {
      --bg: #f3f0ff;
      --panel: rgba(255,255,255,0.82);
      --panel-strong: rgba(255,255,255,0.92);
      --ink: #15141d;
      --muted: rgba(21,20,29,0.62);
      --line: rgba(34,28,72,0.08);
      --purple: #6d28d9;
      --violet: #a855f7;
      --pink: #ec4899;
      --blue: #38bdf8;
      --orange: #f59e0b;
      --green: #10b981;
      --shadow: 0 20px 50px rgba(76, 29, 149, 0.10);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      overflow: auto;
      background:
        radial-gradient(circle at 0% 0%, rgba(167,139,250,0.16), transparent 30%),
        radial-gradient(circle at 100% 20%, rgba(56,189,248,0.14), transparent 26%),
        radial-gradient(circle at 80% 100%, rgba(236,72,153,0.12), transparent 28%),
        linear-gradient(180deg, #f4f1ff 0%, #f7f8ff 100%);
      color: var(--ink);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 340px;
      height: 340px;
      border: 1px solid rgba(109,40,217,0.16);
      border-radius: 46% 54% 59% 41% / 44% 35% 65% 56%;
      pointer-events: none;
      z-index: 0;
      filter: blur(0.2px);
    }

    body::before {
      top: -90px;
      left: -80px;
      transform: rotate(12deg);
    }

    body::after {
      right: -100px;
      bottom: -80px;
      transform: rotate(-18deg);
    }

    .stats-wrap {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    .stats-shell {
      border: 1px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.76);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 26px;
    }

    .stats-head {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
    }

    .stats-head-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .stats-title-wrap {
      display: grid;
      gap: 4px;
    }

    .stats-title {
      margin: 0;
      font-size: 36px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .stats-sub {
      margin: 0;
      font-size: 15px;
      color: var(--muted);
    }

    .stats-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stats-nav .btn {
      border-radius: 14px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 8px 24px rgba(91,33,182,0.08);
      text-decoration: none;
      color: inherit;
    }

    .hero-band {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .hero-card {
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.28), transparent 30%),
        linear-gradient(135deg, #5b21b6 0%, #7c3aed 35%, #db2777 100%);
      color: white;
      border-radius: 22px;
      padding: 22px;
      min-height: 190px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(91,33,182,0.20);
    }

    .hero-card::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -80px;
      top: -80px;
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 48% 52% 60% 40% / 42% 44% 56% 58%;
    }

    .hero-kicker {
      font-size: 13px;
      opacity: 0.82;
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero-value {
      font-size: 54px;
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin-bottom: 10px;
    }

    .hero-sub {
      max-width: 520px;
      font-size: 15px;
      opacity: 0.88;
      line-height: 1.4;
    }

    .hero-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .hero-pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 13px;
      backdrop-filter: blur(8px);
    }

    .spotlight-stack {
      display: grid;
      gap: 14px;
    }

    .spotlight-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(248,245,255,0.92));
      border: 1px solid rgba(91,33,182,0.08);
      border-radius: 22px;
      padding: 18px;
      min-height: 88px;
      box-shadow: 0 12px 30px rgba(91,33,182,0.06);
    }

    .spotlight-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .spotlight-main {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .spotlight-value {
      font-size: 28px;
      font-weight: 750;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .delta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .delta.up {
      color: #065f46;
      background: rgba(16,185,129,0.12);
    }

    .delta.down {
      color: #9f1239;
      background: rgba(236,72,153,0.12);
    }

    .delta.flat {
      color: #374151;
      background: rgba(107,114,128,0.10);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 14px;
    }

    .panel {
      grid-column: span 3;
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 12px 34px rgba(91,33,182,0.06);
    }

    .panel.wide {
      grid-column: span 6;
    }

    .panel.full {
      grid-column: span 12;
    }

    .panel.gradient {
      color: white;
      border: 0;
      box-shadow: 0 20px 42px rgba(91,33,182,0.16);
    }

    .panel.gradient.purple {
      background: linear-gradient(135deg, #5b21b6 0%, #7c3aed 48%, #8b5cf6 100%);
    }

    .panel.gradient.blue {
      background: linear-gradient(135deg, #2563eb 0%, #38bdf8 100%);
    }

    .panel.gradient.dark {
      background: linear-gradient(135deg, #111827 0%, #0f172a 100%);
    }

    .panel-kicker {
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .panel.gradient .panel-kicker {
      color: rgba(255,255,255,0.76);
    }

    .panel-value {
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .panel-sub {
      font-size: 14px;
      line-height: 1.4;
      color: var(--muted);
    }

    .panel.gradient .panel-sub {
      color: rgba(255,255,255,0.82);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-list {
      display: grid;
      gap: 10px;
    }

    .stat-list-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(34,28,72,0.08);
      font-size: 14px;
      align-items: center;
    }

    .stat-list-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .stat-list-label {
      opacity: 0.78;
    }

    .stat-list-value {
      font-weight: 700;
      text-align: right;
    }

    .meter-list {
      display: grid;
      gap: 12px;
    }

    .meter-row {
      display: grid;
      gap: 6px;
    }

    .meter-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
    }

    .meter-track {
      height: 12px;
      border-radius: 999px;
      background: rgba(91,33,182,0.08);
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--purple), var(--pink));
    }

    .spark-wrap {
      margin-top: 10px;
    }

    .spark-chart {
      display: flex;
      align-items: end;
      gap: 8px;
      height: 180px;
      padding-top: 14px;
    }

    .spark-col {
      flex: 1;
      display: grid;
      justify-items: center;
      gap: 8px;
      min-width: 0;
    }

    .spark-bar {
      width: 100%;
      max-width: 42px;
      border-radius: 14px 14px 6px 6px;
      background: linear-gradient(180deg, rgba(168,85,247,0.28), rgba(109,40,217,0.88));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
      min-height: 8px;
    }

    .spark-label {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(109,40,217,0.08);
      color: #5b21b6;
      font-weight: 700;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .section-copy {
      margin: -4px 0 14px;
      font-size: 14px;
      color: var(--muted);
    }

    .empty {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      color: var(--muted);
      background: rgba(255,255,255,0.75);
    }

    @media (max-width: 1080px) {
      .hero-band {
        grid-template-columns: 1fr;
      }

      .panel {
        grid-column: span 6;
      }

      .panel.wide {
        grid-column: span 12;
      }
    }

    @media (max-width: 720px) {
      .stats-shell {
        padding: 18px;
      }

      .stats-title {
        font-size: 30px;
      }

      .hero-value {
        font-size: 42px;
      }

      .panel,
      .panel.wide,
      .panel.full {
        grid-column: span 12;
      }

      .mini-grid {
        grid-template-columns: 1fr;
      }

      .stats-nav {
        width: 100%;
      }

      .stats-nav .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="stats-wrap">
    <div class="stats-shell">
      <div class="stats-head">
        <div class="stats-head-top">
          <div class="stats-title-wrap">
            <h1 class="stats-title">Stats</h1>
            <p class="stats-sub">All your scene-hunting chaos, glamorized properly.</p>
          </div>

          <div class="stats-nav">
            <a href="../" class="btn">Map view</a>
            <a href="../browse/" class="btn">Browse view</a>
          </div>
        </div>
      </div>

      <div id="statsLoading" class="empty">Loading stats…</div>
      <div id="statsRoot" style="display:none;"></div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="./stats.js"></script>
</body>
</html>
